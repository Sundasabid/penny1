name: app
description: "PENNY – Personal Finance Manager"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  go_router: ^14.2.7
  intl: ^0.19.0
  uuid: ^4.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  image_picker: ^1.1.2
  google_mlkit_document_scanner: ^0.3.0
  google_mlkit_text_recognition: ^0.13.0

  # Icons
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  google_generative_ai: any
  flutter_markdown: ^0.7.7+1
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  flutter_contacts: ^1.1.9+2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  telephony: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/google_logo.png
    - assets/images/onboarding_sms.png
    - assets/images/onboarding_ai_v2.png
